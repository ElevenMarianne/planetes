<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="b-sphere" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#b3e5fc"/>
      <stop offset="25%"  stop-color="#0288d1"/>
      <stop offset="55%"  stop-color="#01579b"/>
      <stop offset="100%" stop-color="#001830"/>
    </radialGradient>
    <radialGradient id="b-glow" cx="36%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#e1f5fe" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#81d4fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b-shadow" cx="72%" cy="74%" r="55%">
      <stop offset="0%"   stop-color="#000814" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000814" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b-storm" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4fc3f7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0277bd" stop-opacity="0"/>
    </radialGradient>
    <filter id="b-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <clipPath id="b-clip"><circle cx="24" cy="24" r="18"/></clipPath>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#b-sphere)"/>
  <g clip-path="url(#b-clip)">
    <!-- Bandes atmosphériques -->
    <rect x="6"  y="14" width="36" height="3"   rx="1.5" fill="#4fc3f7" opacity="0.4" filter="url(#b-blur)"/>
    <rect x="6"  y="19" width="36" height="2.5" rx="1"   fill="#01579b" opacity="0.45" filter="url(#b-blur)"/>
    <rect x="6"  y="24" width="36" height="3.5" rx="1.5" fill="#0288d1" opacity="0.3"  filter="url(#b-blur)"/>
    <rect x="6"  y="29" width="36" height="2.5" rx="1"   fill="#4fc3f7" opacity="0.35" filter="url(#b-blur)"/>
    <!-- Tempête tourbillonnante -->
    <ellipse cx="27" cy="22" rx="4.5" ry="3"   fill="url(#b-storm)" filter="url(#b-blur)"/>
    <ellipse cx="27" cy="22" rx="2.5" ry="1.8" fill="#e1f5fe" opacity="0.45" filter="url(#b-blur)"/>
    <!-- Nuages de glace -->
    <ellipse cx="18" cy="17" rx="5"  ry="2"    fill="#e1f5fe" opacity="0.3" filter="url(#b-blur)"/>
    <ellipse cx="30" cy="30" rx="4"  ry="1.8"  fill="#e1f5fe" opacity="0.25" filter="url(#b-blur)"/>
    <!-- Calotte polaire -->
    <ellipse cx="24" cy="8"  rx="6.5" ry="3"   fill="#e1f5fe" opacity="0.55" filter="url(#b-blur)"/>
    <!-- Shadow -->
    <circle cx="24" cy="24" r="18" fill="url(#b-shadow)"/>
    <!-- Reflet -->
    <ellipse cx="15" cy="15" rx="6.5" ry="4.5" fill="url(#b-glow)"/>
  </g>
  <circle cx="24" cy="24" r="18" fill="none" stroke="#001226" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
