<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="r-sphere" cx="36%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ff8a65"/>
      <stop offset="30%"  stop-color="#e53935"/>
      <stop offset="65%"  stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#4e0000"/>
    </radialGradient>
    <radialGradient id="r-glow" cx="38%" cy="30%" r="42%">
      <stop offset="0%"   stop-color="#ffccbc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff8a65" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r-shadow" cx="70%" cy="72%" r="55%">
      <stop offset="0%"   stop-color="#1a0000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="r-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <clipPath id="r-clip"><circle cx="24" cy="24" r="18"/></clipPath>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#r-sphere)"/>
  <g clip-path="url(#r-clip)">
    <!-- Bandes de surface -->
    <ellipse cx="24" cy="20" rx="18" ry="4" fill="#c62828" opacity="0.4" filter="url(#r-blur)"/>
    <ellipse cx="24" cy="28" rx="18" ry="3" fill="#7f0000" opacity="0.35" filter="url(#r-blur)"/>
    <!-- Cratères -->
    <circle cx="18" cy="22" r="3.5" fill="#7f0000" opacity="0.5" filter="url(#r-blur)"/>
    <circle cx="18" cy="22" r="2" fill="#5d0000" opacity="0.6"/>
    <circle cx="30" cy="26" r="2.5" fill="#7f0000" opacity="0.4" filter="url(#r-blur)"/>
    <circle cx="30" cy="26" r="1.4" fill="#5d0000" opacity="0.5"/>
    <!-- Calotte polaire nord -->
    <ellipse cx="24" cy="8"  rx="7" ry="3.5" fill="#ffccbc" opacity="0.7" filter="url(#r-blur)"/>
    <!-- Shadow côté -->
    <circle cx="24" cy="24" r="18" fill="url(#r-shadow)"/>
    <!-- Reflet -->
    <ellipse cx="17" cy="16" rx="6" ry="4" fill="url(#r-glow)"/>
  </g>
  <circle cx="24" cy="24" r="18" fill="none" stroke="#1a0000" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
