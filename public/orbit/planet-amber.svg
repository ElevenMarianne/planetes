<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="a-sphere" cx="35%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#ffe0b2"/>
      <stop offset="28%"  stop-color="#ffb300"/>
      <stop offset="58%"  stop-color="#e65100"/>
      <stop offset="100%" stop-color="#4e2000"/>
    </radialGradient>
    <radialGradient id="a-glow" cx="36%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#fff8e1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffe082" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a-shadow" cx="72%" cy="74%" r="55%">
      <stop offset="0%"   stop-color="#1a0800" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#1a0800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a-spot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c84000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6f00" stop-opacity="0"/>
    </radialGradient>
    <filter id="a-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
    <clipPath id="a-clip"><circle cx="24" cy="24" r="18"/></clipPath>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#a-sphere)"/>
  <g clip-path="url(#a-clip)">
    <!-- Bandes nuageuses horizontales -->
    <rect x="6"  y="13" width="36" height="3.5" rx="1.5" fill="#ffcc80" opacity="0.45" filter="url(#a-blur)"/>
    <rect x="6"  y="18" width="36" height="2.5" rx="1"   fill="#bf360c" opacity="0.35" filter="url(#a-blur)"/>
    <rect x="6"  y="22" width="36" height="4"   rx="1.5" fill="#ff8f00" opacity="0.3"  filter="url(#a-blur)"/>
    <rect x="6"  y="27" width="36" height="2.5" rx="1"   fill="#e65100" opacity="0.4"  filter="url(#a-blur)"/>
    <rect x="6"  y="31" width="36" height="3"   rx="1.5" fill="#ffcc80" opacity="0.3"  filter="url(#a-blur)"/>
    <!-- Grande tache rouge (tempête) -->
    <ellipse cx="28" cy="25" rx="5" ry="3.5" fill="url(#a-spot)" filter="url(#a-blur)"/>
    <ellipse cx="28" cy="25" rx="3" ry="2"   fill="#a83200" opacity="0.6"/>
    <!-- Shadow -->
    <circle cx="24" cy="24" r="18" fill="url(#a-shadow)"/>
    <!-- Reflet -->
    <ellipse cx="16" cy="15" rx="7" ry="4.5" fill="url(#a-glow)"/>
  </g>
  <circle cx="24" cy="24" r="18" fill="none" stroke="#2e1000" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
