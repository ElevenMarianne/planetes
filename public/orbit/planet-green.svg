<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="g-sphere" cx="35%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#c8e6c9"/>
      <stop offset="25%"  stop-color="#43a047"/>
      <stop offset="55%"  stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#0a1f0a"/>
    </radialGradient>
    <radialGradient id="g-ocean" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1565c0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-glow" cx="36%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#e8f5e9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a5d6a7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-shadow" cx="72%" cy="74%" r="55%">
      <stop offset="0%"   stop-color="#000d00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000d00" stop-opacity="0"/>
    </radialGradient>
    <filter id="g-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
    <clipPath id="g-clip"><circle cx="24" cy="24" r="18"/></clipPath>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#g-sphere)"/>
  <g clip-path="url(#g-clip)">
    <!-- Océans -->
    <ellipse cx="20" cy="26" rx="8"  ry="6"  fill="url(#g-ocean)" filter="url(#g-blur)"/>
    <ellipse cx="31" cy="20" rx="5"  ry="4"  fill="#1565c0" opacity="0.4" filter="url(#g-blur)"/>
    <!-- Continents -->
    <ellipse cx="22" cy="20" rx="5.5" ry="4" fill="#2e7d32" opacity="0.6" filter="url(#g-blur)"/>
    <ellipse cx="30" cy="28" rx="4.5" ry="3.5" fill="#388e3c" opacity="0.55" filter="url(#g-blur)"/>
    <ellipse cx="16" cy="30" rx="3"  ry="2.5" fill="#1b5e20" opacity="0.5" filter="url(#g-blur)"/>
    <!-- Nuages -->
    <ellipse cx="24" cy="14" rx="8" ry="2.5" fill="white" opacity="0.35" filter="url(#g-blur)"/>
    <ellipse cx="32" cy="22" rx="5" ry="2"   fill="white" opacity="0.25" filter="url(#g-blur)"/>
    <!-- Calotte polaire -->
    <ellipse cx="24" cy="8"  rx="6" ry="3"   fill="white" opacity="0.55" filter="url(#g-blur)"/>
    <!-- Shadow -->
    <circle cx="24" cy="24" r="18" fill="url(#g-shadow)"/>
    <!-- Reflet -->
    <ellipse cx="16" cy="15" rx="6" ry="4" fill="url(#g-glow)"/>
  </g>
  <circle cx="24" cy="24" r="18" fill="none" stroke="#0a1a0a" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
