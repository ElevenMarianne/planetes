framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 60000
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 0
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\SlackPointsNotification: async
            App\Message\SlackTrophyNotification: async
            App\Message\SlackAnniversaryNotification: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
