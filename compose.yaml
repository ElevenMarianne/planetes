services:
  php:
    build:
      context: .docker/php
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: dev
    networks:
      - planetes

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - planetes

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planetes}
      POSTGRES_USER: ${POSTGRES_USER:-planetes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planetes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planetes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - planetes

  cron:
    build:
      context: .docker/cron
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      APP_ENV: prod
    networks:
      - planetes

  messenger-worker:
    build:
      context: .docker/php
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=128M
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      APP_ENV: dev
    networks:
      - planetes

volumes:
  postgres_data:

networks:
  planetes:
